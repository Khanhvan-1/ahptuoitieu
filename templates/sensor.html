<!DOCTYPE html>
<html>

<head>

<title>Sensor Monitoring</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#f4f6f9;
}

.card{
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

#alert{
font-size:18px;
color:red;
}

</style>

</head>

<body>

<div class="container mt-4">

<h2> Sensor Monitoring</h2>

<div id="alert"></div>

<div class="row mt-4">

<div class="col-md-3">

<div class="card p-3 text-center">

<h5>Nhiệt độ</h5>

<h3 id="temp">--</h3>

</div>

</div>

<div class="col-md-3">

<div class="card p-3 text-center">

<h5>Độ ẩm</h5>

<h3 id="humidity">--</h3>

</div>

</div>

<div class="col-md-3">

<div class="card p-3 text-center">

<h5>Độ ẩm đất</h5>

<h3 id="soil">--</h3>

</div>

</div>

<div class="col-md-3">

<div class="card p-3 text-center">

<h5>Bức xạ</h5>

<h3 id="radiation">--</h3>

</div>

</div>

</div>


<div class="card mt-5 p-4">

<h4> Sensor Realtime Chart</h4>

<canvas id="chart"></canvas>

</div>

</div>


<script>

let chartData=[]

var ctx=document.getElementById("chart")

var chart=new Chart(ctx,{

type:"line",

data:{

labels:[],

datasets:[{

label:"Temperature",

data:[],

borderColor:"red"

}]

}

})


function loadSensor(){

fetch("/sensor_data/")

.then(res=>res.json())

.then(res=>{

let d=res.data

document.getElementById("temp").innerHTML=d.temperature+" °C"
document.getElementById("humidity").innerHTML=d.humidity+" %"
document.getElementById("soil").innerHTML=d.soil
document.getElementById("radiation").innerHTML=d.radiation

document.getElementById("alert").innerHTML=res.alert


let now=new Date().toLocaleTimeString()

chart.data.labels.push(now)

chart.data.datasets[0].data.push(d.temperature)

if(chart.data.labels.length>10){

chart.data.labels.shift()
chart.data.datasets[0].data.shift()

}

chart.update()

})

}


setInterval(loadSensor,3000)

loadSensor()

</script>

</body>

</html>
